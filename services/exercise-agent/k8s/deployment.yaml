apiVersion: apps/v1
kind: Deployment
metadata:
  name: exercise-agent
  labels:
    app: exercise-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exercise-agent
  template:
    metadata:
      labels:
        app: exercise-agent
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "exercise-agent"
        dapr.io/app-port: "8000"
    spec:
      containers:
        - name: exercise-agent
          image: learnflow/exercise-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api-key
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
