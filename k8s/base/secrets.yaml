apiVersion: v1
kind: Secret
metadata:
  name: openai-secret
  namespace: default
type: Opaque
stringData:
  api-key: "your-openai-api-key-here"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: default
type: Opaque
stringData:
  connection-string: "host=postgresql.postgres.svc.cluster.local user=learnflow password=learnflow-secret dbname=learnflow sslmode=disable"
