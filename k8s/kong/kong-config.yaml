apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: kong
data:
  KONG_DATABASE: "off"
  KONG_DECLARATIVE_CONFIG: "/etc/kong/kong.yml"
  KONG_PROXY_LISTEN: "0.0.0.0:8000"
  KONG_ADMIN_LISTEN: "0.0.0.0:8001"
  KONG_LOG_LEVEL: "info"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative
  namespace: kong
data:
  kong.yml: |
    _format_version: "3.0"
    services:
      - name: triage-service
        url: http://triage-agent.default.svc.cluster.local:8000
        routes:
          - name: triage-route
            paths: ["/api/triage"]
            strip_path: true
            methods: ["GET", "POST", "OPTIONS"]
        plugins:
          - name: cors
            config:
              origins: ["*"]
              methods: ["GET", "POST", "OPTIONS"]
              headers: ["Content-Type", "Authorization"]
          - name: rate-limiting
            config:
              minute: 60
              policy: local

      - name: concepts-service
        url: http://concepts-agent.default.svc.cluster.local:8000
        routes:
          - name: concepts-route
            paths: ["/api/concepts"]
            strip_path: true

      - name: code-review-service
        url: http://code-review-agent.default.svc.cluster.local:8000
        routes:
          - name: code-review-route
            paths: ["/api/code-review"]
            strip_path: true

      - name: debug-service
        url: http://debug-agent.default.svc.cluster.local:8000
        routes:
          - name: debug-route
            paths: ["/api/debug"]
            strip_path: true

      - name: exercise-service
        url: http://exercise-agent.default.svc.cluster.local:8000
        routes:
          - name: exercise-route
            paths: ["/api/exercise"]
            strip_path: true

      - name: progress-service
        url: http://progress-agent.default.svc.cluster.local:8000
        routes:
          - name: progress-route
            paths: ["/api/progress"]
            strip_path: true

      - name: frontend-service
        url: http://frontend.default.svc.cluster.local:3000
        routes:
          - name: frontend-route
            paths: ["/"]
            strip_path: false

    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
          headers: ["Content-Type", "Authorization"]
          credentials: true
